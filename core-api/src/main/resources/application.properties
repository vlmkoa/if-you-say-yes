spring.application.name=core-api

# PostgreSQL (override with env or profile)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ifyousayyes}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Server
server.port=${SERVER_PORT:8080}

# Actuator health (for frontend and load balancers)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Moderation: set MODERATION_API_KEY to allow approve/reject of comments via X-Moderation-Key header
moderation.api-key=${MODERATION_API_KEY:}

# CORS: comma-separated origins (e.g. https://your-app.vercel.app). Default allows localhost for dev.
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost,http://127.0.0.1}
