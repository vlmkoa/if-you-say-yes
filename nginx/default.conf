# Optional reverse proxy: single entry point for frontend + Python backend.
# When using nginx profile, access app at http://localhost (port 80).
# Set NEXT_PUBLIC_BACKEND_URL=http://localhost/api/backend when building frontend so the interaction form uses the proxy.

server {
    listen 80;
    server_name localhost;
    client_max_body_size 4M;

    # Frontend (Next.js)
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Python backend (interaction, health) — strip /api/backend prefix
    location /api/backend/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
